<!DOCTYPE html>
<html>

<head>
    <title>Invite to private channel</title>
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            color: black;
            max-width: 480px;
            margin: 80px auto;
            padding: 28px;
            border-radius: 10px;
            text-align: center;
        }

        .card h1 {
            color: #00c6ff;
            margin-top: 0;
        }

        .card select {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        .card button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        .card a {
            color: #00c6ff;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Invite to #{{ channel_name }}</h1>
        <p style="text-align: left; font-size: 14px;">User must already be a <b>full member</b> of the workspace
            (accepted invite).</p>
        <form method="POST">
            <label>Member
                <select name="target_uid" required>
                    {% for u in candidates %}
                    <option value="{{ u[0] }}">{{ u[1] }} ({{ u[2] }})</option>
                    {% endfor %}
                </select>
            </label>
            <p><button type="submit">Send channel invite</button></p>
        </form>
        <p><a href="{{ url_for('chat', channel_wid=channel_wid, channel_name=channel_name) }}">Back to channel</a></p>
    </div>
</body>

</html>
