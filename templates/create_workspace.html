<!DOCTYPE html>
<html>

<head>
    <title>Create Workspace</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: #00c6ff;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 5px #00c6ff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c6ff;
            border: none;
            border-radius: 6px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00a3cc;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: yellow;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Create Workspace</h1>

        <form method="POST" action="/create_workspace">
            <input name="name" placeholder="Workspace Name" required>
            <input name="description" placeholder="Description">

            <button type="submit">Create</button>
        </form>

        <a href="/workspaces" class="back">⬅ Back</a>
    </div>

</body>

</html>
