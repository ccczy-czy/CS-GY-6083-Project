<!DOCTYPE html>
<html>
<head>
    <title>Channel</title>
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .chat-box {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            color: black;
            border-radius: 10px;
            padding: 20px;
        }
        .msg {
            padding: 10px;
            margin: 8px;
            border-radius: 10px;
            max-width: 60%;
        }
        .my-msg {
            background-color: #d4edda;
            margin-left: auto;
            text-align: right;
        }
        .other-msg {
            background-color: #f1f1f1;
            margin-right: auto;
        }
        .name { font-weight: bold; }
        .input-box {
            display: flex;
            margin-top: 16px;
            padding: 10px;
            background: #eee;
            border-radius: 8px;
        }
        .input-box input { flex: 1; padding: 8px; }
        .input-box button {
            padding: 8px 16px;
            background: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-box">
        <h2 style="color: #00c6ff; margin-top: 0;">#{{ channel_name }}</h2>
        {% for m in messages %}
        {% if m[2] == session['nickname'] %}
        <div class="msg my-msg">
        {% else %}
        <div class="msg other-msg">
        {% endif %}
            <div class="name">{{ m[2] }}</div>
            <div class="content">{{ m[1] }}</div>
            {% if m[2] == session['nickname'] %}
            <a href="/delete_message/{{ m[0] }}">Delete</a>
            <a href="/message/recall/{{ m[0] }}">Recall</a>
            {% endif %}
        </div>
        {% endfor %}
        <form class="input-box" action="/send_message" method="POST">
            <input type="hidden" name="channel_wid" value="{{ workspace_id }}">
            <input type="hidden" name="channel_name" value="{{ channel_name }}">
            <input type="text" name="content" placeholder="Type message...">
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
