<!DOCTYPE html>
<html>

<head>
    <title>Workspaces</title>

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            font-family: Arial;
        }

        table {
            background: white;
            color: black;
            border-radius: 8px;
            padding: 10px;
        }

        h1 {
            color: #00c6ff;
        }

        a {
            color: #00e6ff;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            color: red;
        }
    </style>
</head>

<body style="padding: 20px;">

    <h1>Workspace List</h1>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
        </tr>

        {% for w in workspaces %}
        <tr>
            <td>{{ w.wid }}</td>
            <td>
                <a href="/workspace/{{ w.wid }}">
                    {{ w.name }}
                </a>
            </td>
            <td>{{ w.description }}</td>
        </tr>
        {% endfor %}

    </table>

    <br>

    <a href="/create_workspace">Create workspace</a>
    <br><br>
    <a href="/home">Home</a> &middot; <a href="/invitations">Invitations</a> &middot; <a href="/search">Search</a>
    <br><br>
    <a href="/users">User list (demo)</a>

</body>

</html>
