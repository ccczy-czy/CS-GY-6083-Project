<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("https://as2.ftcdn.net/jpg/07/16/81/55/1000_F_716815557_Qk2Cr2qfPMsGtOCRXf7JymRjPkoKjeUo.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .login-box {
            width: 300px;
            margin: auto;
            margin-top: 150px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        .login-box button {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .login-box a {
            color: #7ec8ff;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>
        {% if error %}
        <p style="color: #ff6b6b; text-align: center;">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input name="email" placeholder="Email" type="text" autocomplete="username">
            <br>
            <input name="password" type="password" placeholder="Password" autocomplete="current-password">
            <br>
            <button type="submit">Login</button>
        </form>
        <br>
        <a href="/register">Go to Register</a>
    </div>
</body>

</html>
