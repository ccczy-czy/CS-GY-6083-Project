<!DOCTYPE html>
<html>

<head>
    <title>Users</title>
    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        .card {
            background: white;
            color: black;
            width: 600px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #00c6ff;
            color: white;
        }

        a {
            text-decoration: none;
            font-weight: bold;
        }

        .delete {
            color: red;
        }

        .add {
            color: #00c6ff;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>User List</h1>
        <table>
            <tr>
                <th>ID</th>
                <th>Nickname</th>
                <th>Action</th>
            </tr>
            {% for u in users %}
            <tr>
                <td>{{ u.uid }}</td>
                <td>{{ u.nickname }}</td>
                <td>
                    <a href="/user/delete/{{ u.uid }}" class="delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="/register" class="add">+ Add User</a>
    </div>
</body>

</html>
