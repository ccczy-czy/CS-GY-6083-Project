services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postpre
      POSTGRES_DB: "Project Part 1"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: "Project Part 1"
      DB_USER: postgres
      DB_PASSWORD: postpre
      SECRET_KEY: shubo_secret_key
      PORT: "5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
